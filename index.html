<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Branch Manager</title>
<meta name="description" content="Second Nature Tree Service — Job Management">
<meta name="theme-color" content="#1a8a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Branch Manager">
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --green-dark: #1a8a5c;
    --green: #22a96b;
    --green-light: #7ac143;
    --green-bg: #f0f9f4;
    --white: #ffffff;
    --bg: #f7f8fa;
    --text: #2d3748;
    --text-light: #8492a6;
    --border: #e8ecf1;
    --red: #e53e3e;
    --orange: #ed8936;
    --blue: #4299e1;
    --sidebar-w: 240px;
    --sidebar-bg: #ffffff;
    --sidebar-border: #e8ecf1;
    --sidebar-hover: #f0f9f4;
    --sidebar-active: #e6f6ee;
    --accent: #1a8a5c;
  }
  [data-theme="dark"] {
    --green-bg: #1a2e23;
    --white: #1e2128;
    --bg: #15171c;
    --text: #e2e8f0;
    --text-light: #8492a6;
    --border: #2d3748;
    --sidebar-bg: #1a1d24;
    --sidebar-border: #2d3748;
    --sidebar-hover: #1a2e23;
    --sidebar-active: #1a3328;
  }
  [data-theme="dark"] .data-table th { background:#1a1d24; }
  [data-theme="dark"] .stat-card { background:var(--white); }
  [data-theme="dark"] .modal { background:#1e2128; color:var(--text); }
  [data-theme="dark"] .modal-header { border-color:var(--border); }
  [data-theme="dark"] input, [data-theme="dark"] select, [data-theme="dark"] textarea { background:#2d3748; color:var(--text); border-color:#4a5568; }
  [data-theme="dark"] .toast { background:#2d3748; color:#e2e8f0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; font-size:14px; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  /* ── Layout ── */
  .app { display:flex; height:100vh; }

  /* ── Sidebar (Jobber-style light) ── */
  .sidebar {
    width:var(--sidebar-w); background:var(--sidebar-bg); color:var(--text);
    display:flex; flex-direction:column; flex-shrink:0;
    transition: width 0.2s ease, transform 0.25s ease;
    z-index:100; border-right:1px solid var(--sidebar-border);
    overflow:hidden;
  }
  .sidebar.collapsed { width:56px; }
  .sidebar.collapsed .sidebar-header h1,
  .sidebar.collapsed .sidebar-user,
  .sidebar.collapsed .nav-section,
  .sidebar.collapsed .nav-item span:not(.icon),
  .sidebar.collapsed .nav-item .badge,
  .sidebar.collapsed > div[style*="padding"]:not(.sidebar-footer) { display:none !important; }
  .sidebar.collapsed .sidebar-footer { padding:8px !important; justify-content:center; }
  .sidebar.collapsed .sidebar-footer .log-out-btn { display:none !important; }
  .sidebar.collapsed .sidebar-header { justify-content:center; padding:14px 8px; cursor:pointer; }
  .sidebar.collapsed .nav-item { justify-content:center; padding:10px 0; font-size:0; overflow:hidden; }
  .sidebar.collapsed .nav-item .icon { width:auto; font-size:16px; }
  .sidebar.collapsed .nav-item .icon i, .sidebar.collapsed .nav-item .icon svg { width:20px; height:20px; }
  .sidebar.collapsed .create-btn { font-size:0; padding:10px; }
  .sidebar.collapsed .create-btn::before { content:'+'; font-size:18px; font-weight:700; }
  .sidebar-header {
    padding:16px 14px 14px; border-bottom:1px solid var(--sidebar-border);
    display:flex; align-items:center; gap:10px;
  }
  .sidebar-logo {
    width:32px; height:32px; flex-shrink:0;
  }
  .sidebar-logo svg { width:32px; height:32px; }
  .sidebar-header h1 {
    font-size:14px; font-weight:700; color:var(--text); line-height:1.25; letter-spacing:-.01em;
  }
  .sidebar-header h1 span { display:block; font-size:10px; font-weight:500; color:var(--text-light); margin-top:1px; letter-spacing:0; }
  .sidebar-user {
    padding:10px 16px; font-size:12px; color:var(--text-light); border-bottom:1px solid var(--sidebar-border);
  }

  .sidebar-nav { flex:1; padding:8px 8px; overflow-y:auto; }
  .nav-section { padding:16px 8px 6px; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-light); font-weight:700; }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:8px 10px;
    font-size:13px; color:var(--text-light); cursor:pointer;
    transition: all 0.12s; text-decoration:none; border:none; background:none; width:100%;
    border-radius:6px; margin-bottom:1px; border-left:none;
  }
  .nav-item:hover { background:var(--sidebar-hover); color:var(--text); }
  .nav-item.active { background:var(--sidebar-active); color:var(--accent); font-weight:600; }
  .nav-item .icon { width:20px; text-align:center; font-size:14px; display:flex; align-items:center; justify-content:center; }
  .nav-item .li { width:18px; height:18px; stroke:var(--text-light); stroke-width:1.75; }
  .nav-item:hover .li { stroke:var(--text); }
  .nav-item.active .li { stroke:var(--accent); }
  .nav-item .badge { margin-left:auto; background:var(--red); color:#fff; font-size:10px; font-weight:700; padding:2px 6px; border-radius:10px; min-width:18px; text-align:center; }

  .sidebar-footer {
    padding:10px 16px; border-top:1px solid var(--sidebar-border);
    font-size:10px; color:var(--text-light);
  }

  /* ── Main Content (Jobber style) ── */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 28px; background:var(--white); border-bottom:1px solid var(--border);
    min-height:56px;
  }
  .topbar h2 { font-size:20px; font-weight:700; color:var(--text); letter-spacing:-.01em; }
  .topbar-actions { display:flex; gap:8px; align-items:center; }

  .btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:8px 16px; border-radius:6px; font-size:13px; font-weight:600;
    cursor:pointer; border:none; transition:all .12s; text-decoration:none;
  }
  .btn-primary { background:var(--accent); color:var(--white); }
  .btn-primary:hover { background:#15775a; }
  .btn-outline { background:var(--white); color:var(--text); border:1px solid var(--border); }
  .btn-outline:hover { background:var(--bg); border-color:#9ca3af; }
  .btn-danger { background:#dc3545; color:#fff; }

  .content { flex:1; overflow-y:auto; padding:24px; }

  /* ── Mobile hamburger ── */
  .hamburger {
    display:none; background:none; border:none; color:var(--text); font-size:24px;
    cursor:pointer; padding:4px;
  }
  .sidebar-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:99;
  }

  /* ── Dashboard Cards (Jobber style) ── */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin-bottom:20px; }
  .stat-card {
    background:var(--white); border-radius:8px; padding:16px 18px;
    border:1px solid var(--border); position:relative;
    transition: box-shadow .15s;
  }
  .stat-card:hover { box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .stat-card .stat-label { font-size:11px; color:var(--text-light); text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px; font-weight:600; }
  .stat-card .stat-value { font-size:26px; font-weight:800; color:var(--text); }
  .stat-card .stat-sub { font-size:12px; color:var(--text-light); margin-top:2px; }
  .stat-card .stat-trend { font-size:11px; font-weight:700; }
  .stat-card .stat-trend.up { color:#16a34a; }
  .stat-card .stat-trend.down { color:var(--red); }

  /* ── Tables (Jobber style) ── */
  .data-table { width:100%; border-collapse:collapse; background:var(--white); border-radius:8px; overflow:hidden; border:1px solid var(--border); }
  .data-table th { background:#f9fafb; padding:8px 16px; text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--text-light); border-bottom:1px solid var(--border); }
  .data-table td { padding:10px 16px; font-size:13px; border-bottom:1px solid #f3f4f6; }
  .data-table tr:hover { background:#f9fafb; cursor:pointer; }
  .data-table tr:last-child td { border:none; }

  /* ── Status Badges (Jobber colors) ── */
  .status-badge {
    display:inline-block; padding:2px 10px; border-radius:12px;
    font-size:11px; font-weight:600; letter-spacing:.01em;
  }
  .status-active { background:#e6f6ee; color:#1a8a5c; }
  .status-lead { background:#e8f0fe; color:#2b6cb0; }
  .status-late { background:#fde8e8; color:#c53030; }
  .status-paid { background:#e6f6ee; color:#1a8a5c; }
  .status-draft { background:#edf2f7; color:#718096; }
  .status-sent { background:#fefcbf; color:#975a16; }
  .status-new { background:#e8f0fe; color:#2b6cb0; }
  .status-completed { background:#e6f6ee; color:#1a8a5c; }
  .status-scheduled { background:#ebf4ff; color:#3182ce; }
  .status-in_progress, .status-in-progress { background:#fefcbf; color:#975a16; }
  .status-awaiting, .status-awaiting_response, .status-awaiting_payment { background:#fefcbf; color:#975a16; }
  .status-approved, .status-converted { background:#e6f6ee; color:#1a8a5c; }
  .status-declined, .status-cancelled, .status-past_due, .status-overdue { background:#fde8e8; color:#c53030; }
  .status-archived, .status-inactive { background:#edf2f7; color:#718096; }

  /* ── Filter Buttons ── */
  .filter-btn {
    padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600;
    border:1px solid var(--border); background:var(--white); color:var(--text-light);
    cursor:pointer; transition:all .12s;
  }
  .filter-btn:hover { border-color:#9ca3af; color:var(--text); }
  .filter-btn.active, .filter-btn[style*="background:var(--green-dark)"] { background:var(--accent) !important; color:#fff !important; border-color:var(--accent) !important; }

  /* ── Search (Jobber style) ── */
  .search-box {
    display:flex; align-items:center; gap:8px; padding:7px 12px;
    background:#f9fafb; border:1px solid var(--border); border-radius:6px;
    font-size:13px; min-width:240px;
  }
  .search-box:focus-within { border-color:var(--accent); box-shadow:0 0 0 2px rgba(26,138,92,.15); }
  .search-box input { border:none; background:none; outline:none; flex:1; font-size:13px; }

  /* ── Empty state ── */
  .empty-state { text-align:center; padding:48px 20px; color:var(--text-light); }
  .empty-state .empty-icon { font-size:40px; margin-bottom:10px; }
  .empty-state h3 { font-size:16px; color:var(--text); margin-bottom:6px; font-weight:600; }
  .empty-state p { font-size:13px; max-width:380px; margin:0 auto; }

  /* ── Mobile Bottom Nav ── */
  .bottom-nav {
    display:none; position:fixed; bottom:0; left:0; right:0; z-index:150;
    background:var(--white); border-top:1px solid var(--border);
    padding:4px 0 env(safe-area-inset-bottom, 4px);
    box-shadow:0 -2px 12px rgba(0,0,0,.08);
  }
  .bottom-nav-inner {
    display:flex; justify-content:space-around; align-items:center;
  }
  .bottom-nav-btn {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    background:none; border:none; padding:6px 12px; cursor:pointer;
    font-size:10px; color:var(--text-light); font-weight:600;
    transition:color .15s;
  }
  .bottom-nav-btn.active { color:var(--accent); }
  .bottom-nav-btn .bnav-icon { font-size:20px; display:block; margin:0 auto 2px; }
  .bottom-nav-btn svg.bnav-icon { width:22px; height:22px; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .sidebar { position:fixed; left:0; top:0; bottom:0; transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .sidebar-overlay.open { display:block; }
    .hamburger { display:block; }
    .stat-grid { grid-template-columns:1fr 1fr; }
    .content { padding:16px; padding-bottom:80px; }
    .topbar { padding:12px 16px; }
    .search-box { min-width:auto; flex:1; }
    .bottom-nav { display:block; }
    .detail-grid { grid-template-columns:1fr !important; }
    .option-grid { grid-template-columns:1fr !important; }
  }
  @media (max-width: 480px) {
    .stat-grid { grid-template-columns:1fr; }
  }

  /* ── Print ── */
  @media print {
    .sidebar, .bottom-nav, .topbar, .modal-overlay, .sidebar-overlay, #inv-bulk-bar { display:none !important; }
    .app { display:block !important; }
    .content-area { margin-left:0 !important; }
    .content { overflow:visible !important; height:auto !important; padding:0 !important; }
    body { background:#fff !important; color:#000 !important; overflow:visible !important; height:auto !important; }
    .stat-card { border:1px solid #ccc !important; break-inside:avoid; }
    .data-table { font-size:11px; }
    .data-table th { background:#f0f0f0 !important; }
    .btn, button { display:none !important; }
    a { color:#000 !important; text-decoration:none !important; }
  }

  /* ── Modals ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200;
    display:flex; align-items:center; justify-content:center; padding:20px;
    opacity:0; transition:opacity .2s;
  }
  .modal-overlay.open { opacity:1; }
  .modal {
    background:var(--white); border-radius:16px; max-width:560px; width:100%;
    max-height:85vh; display:flex; flex-direction:column;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    transform:translateY(20px); transition:transform .2s;
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal.modal-wide { max-width:800px; }
  .modal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px; border-bottom:1px solid var(--border);
  }
  .modal-header h3 { font-size:18px; font-weight:700; }
  .modal-close { background:none; border:none; font-size:28px; cursor:pointer; color:var(--text-light); line-height:1; padding:0 4px; }
  .modal-body { padding:20px; overflow-y:auto; flex:1; }
  .modal-footer {
    display:flex; align-items:center; justify-content:flex-end; gap:8px;
    padding:12px 20px; border-top:1px solid var(--border);
  }

  /* ── Forms ── */
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:13px; font-weight:600; color:var(--text); margin-bottom:4px; }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; padding:9px 12px; border:2px solid var(--border); border-radius:8px;
    font-size:14px; font-family:inherit; background:var(--white); color:var(--text);
    transition:border-color .15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline:none; border-color:var(--green-light);
  }
  .form-group textarea { resize:vertical; }

  /* ── Toast ── */
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px);
    padding:12px 24px; border-radius:10px; font-size:14px; font-weight:600;
    z-index:300; transition:transform .3s; box-shadow:0 4px 20px rgba(0,0,0,.2);
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast-success { background:var(--accent); color:var(--white); }
  .toast-error { background:var(--red); color:var(--white); }

  /* ── Topbar Icons (Jobber style) ── */
  .topbar-icons {
    display:flex; align-items:center; gap:2px; margin-left:8px;
  }
  .topbar-icon {
    position:relative; width:36px; height:36px; border-radius:8px; border:none;
    background:transparent; cursor:pointer; display:flex; align-items:center;
    justify-content:center; font-size:16px; transition:background .12s;
  }
  .topbar-icon:hover { background:var(--bg); }
  .topbar-dot {
    position:absolute; top:6px; right:6px; width:8px; height:8px;
    background:var(--red); border-radius:50%; display:none;
    border:2px solid var(--white);
  }
  .topbar-dot.active { display:block; }

  .topbar-avatar {
    position:relative; width:34px; height:34px; border-radius:50%;
    background:var(--accent); color:#fff; display:flex; align-items:center;
    justify-content:center; font-size:12px; font-weight:700; cursor:pointer;
    margin-left:6px; user-select:none;
  }
  .avatar-menu {
    display:none; position:absolute; top:42px; right:0; width:200px;
    background:var(--white); border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,.15);
    border:1px solid var(--border); z-index:300; overflow:hidden;
  }
  .avatar-menu.open { display:block; }
  .avatar-menu-header {
    padding:14px 16px; font-size:14px; font-weight:700; color:var(--text);
    border-bottom:1px solid var(--border); line-height:1.3;
  }
  .avatar-menu-header span { font-size:12px; font-weight:400; color:var(--text-light); }
  .avatar-menu button {
    display:flex; align-items:center; gap:8px; width:100%; padding:10px 16px;
    font-size:13px; border:none; background:none; cursor:pointer; color:var(--text);
    text-align:left;
  }
  .avatar-menu button:hover { background:var(--bg); }
  .avatar-menu hr { border:none; border-top:1px solid var(--border); margin:0; }

  /* ── Filter buttons ── */
  .client-filter.active { background:var(--green-dark) !important; color:var(--white) !important; border-color:var(--green-dark) !important; }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header" onclick="if(document.getElementById('sidebar').classList.contains('collapsed'))toggleSidebar()">
      <div class="sidebar-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#1a8a5c"/>
          <path d="M16 6c-3.5 0-6.5 3-6.5 6.5 0 2.5 1.5 4.5 3.5 5.5v0c-.5.2-3.5 1-5 2.5 1.5-.5 3.5-.5 4.5-.3-1 .5-2.5 1.5-3 2.8 1-.8 2.5-1.2 3.5-1.2-.5.5-1 1.5-1 2.5h2v2h4v-2h2c0-1-.5-2-1-2.5 1 0 2.5.4 3.5 1.2-.5-1.3-2-2.3-3-2.8 1-.2 3-.2 4.5.3-1.5-1.5-4.5-2.3-5-2.5 2-1 3.5-3 3.5-5.5C22.5 9 19.5 6 16 6z" fill="white" opacity=".95"/>
          <rect x="15" y="22" width="2" height="5" rx="1" fill="white" opacity=".7"/>
        </svg>
      </div>
      <h1>Branch Manager <span>Second Nature Tree Service</span></h1>
    </div>
    <div style="padding:10px 14px 8px;">
      <button class="btn btn-primary create-btn" style="width:100%;justify-content:center;padding:9px;font-size:13px;font-weight:600;border-radius:6px;" onclick="QuickCreate.show()">+ Create New</button>
    </div>

    <div class="sidebar-nav">
      <!-- Core navigation (Jobber order) -->
      <button class="nav-item active" data-page="dashboard"><span class="icon"><i data-lucide="layout-dashboard" class="li"></i></span> Home</button>
      <button class="nav-item" data-page="schedule"><span class="icon"><i data-lucide="calendar" class="li"></i></span> Schedule</button>
      <button class="nav-item" data-page="clients"><span class="icon"><i data-lucide="users" class="li"></i></span> Clients <span class="badge" id="badge-clients"></span></button>
      <button class="nav-item" data-page="requests"><span class="icon"><i data-lucide="inbox" class="li"></i></span> Requests <span class="badge" id="badge-requests"></span></button>
      <button class="nav-item" data-page="quotes"><span class="icon"><i data-lucide="file-text" class="li"></i></span> Quotes</button>
      <button class="nav-item" data-page="jobs"><span class="icon"><i data-lucide="wrench" class="li"></i></span> Jobs</button>
      <button class="nav-item" data-page="invoices"><span class="icon"><i data-lucide="receipt" class="li"></i></span> Invoices</button>

      <div style="border-top:1px solid var(--sidebar-border);margin:6px 8px;"></div>

      <button class="nav-item" data-page="pipeline"><span class="icon"><i data-lucide="kanban" class="li"></i></span> Pipeline</button>
      <button class="nav-item" data-page="timesheet"><span class="icon"><i data-lucide="clock" class="li"></i></span> Timesheets</button>
      <button class="nav-item" data-page="expenses"><span class="icon"><i data-lucide="trending-up" class="li"></i></span> Expenses</button>
      <button class="nav-item" data-page="insights"><span class="icon"><i data-lucide="bar-chart-3" class="li"></i></span> Reporting</button>

      <div style="border-top:1px solid var(--sidebar-border);margin:6px 8px;"></div>

      <button class="nav-item" data-page="team"><span class="icon"><i data-lucide="hard-hat" class="li"></i></span> Team</button>
      <button class="nav-item" data-page="automations"><span class="icon"><i data-lucide="puzzle" class="li"></i></span> Apps</button>

// ── Auth Gate ──
function checkAuth() {
  if (!Auth.isLoggedIn()) {
    var appEl = document.querySelector('.app');
    var bottomNav = document.querySelector('.bottom-nav');
    if (appEl) appEl.style.display = 'none';
    if (bottomNav) bottomNav.style.display = 'none';
    var loginDiv = document.getElementById('login-screen');
    if (!loginDiv) {
      loginDiv = document.createElement('div');
      loginDiv.id = 'login-screen';
      document.body.insertBefore(loginDiv, document.body.firstChild);
    }
    loginDiv.innerHTML = Auth.renderLogin();
    return false;
  }
  var appEl = document.querySelector('.app');
  var bottomNav = document.querySelector('.bottom-nav');
  if (appEl) appEl.style.display = '';
  if (bottomNav) bottomNav.style.display = '';
  var loginDiv = document.getElementById('login-screen');
  if (loginDiv) loginDiv.innerHTML = '';

  // Update sidebar user info
  var userEl = document.querySelector('.sidebar-user');
  if (userEl) userEl.innerHTML = Auth.user.name + ' <span style="opacity:.6;">· ' + Auth.role.replace(/_/g, ' ') + '</span>';

  // Hide nav items user can't access
  document.querySelectorAll('.nav-item[data-page]').forEach(function(btn) {
    var page = btn.dataset.page;
    btn.style.display = Auth.canAccess(page) ? '' : 'none';
  });

  return true;
}

function loadPage(page) {
  if (!checkAuth()) return;
  var config = pageConfigs[page] || { title: page, action: null };
  document.getElementById('pageTitle').textContent = config.title;
  var actionBtn = document.getElementById('pageAction');
  if (config.action) {
    actionBtn.textContent = config.action;
    actionBtn.style.display = '';
    actionBtn.onclick = config.actionFn ? new Function(config.actionFn) : null;
  } else {
    actionBtn.style.display = 'none';
  }

  // Update badges
  var newReqs = DB.requests.countNew();
  document.getElementById('badge-requests').textContent = newReqs > 0 ? newReqs : '';
  document.getElementById('badge-clients').textContent = '';

  var content = document.getElementById('pageContent');
  var renderer = pageRenderers[page];
  if (renderer) {
    content.innerHTML = renderer();
  } else {
    content.innerHTML = '<div class="empty-state"><div class="empty-icon">🚧</div><h3>Coming Soon</h3><p>' + config.title + ' — building next.</p></div>';
  }
}
