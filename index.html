<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Branch Manager</title>
<meta name="description" content="Second Nature Tree Service — Job Management">
<meta name="theme-color" content="#1a3c12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Branch Manager">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --green-dark: #1a3c12;
    --green: #2d5a27;
    --green-light: #4a8a10;
    --green-bg: #f0f8e8;
    --white: #ffffff;
    --bg: #f5f6f8;
    --text: #1d1d1f;
    --text-light: #666;
    --border: #e0e0e0;
    --red: #c0392b;
    --orange: #e67e22;
    --blue: #2980b9;
    --sidebar-w: 240px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

  /* ── Layout ── */
  .app { display:flex; height:100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width:var(--sidebar-w); background:var(--green-dark); color:var(--white);
    display:flex; flex-direction:column; flex-shrink:0;
    transition: transform 0.25s ease;
    z-index:100;
  }
  .sidebar-header {
    padding:20px 16px 16px; border-bottom:1px solid rgba(255,255,255,.1);
  }
  .sidebar-header h1 {
    font-size:18px; font-weight:800; letter-spacing:-.02em;
  }
  .sidebar-header h1 span { display:block; font-size:11px; font-weight:400; opacity:.6; margin-top:2px; }
  .sidebar-user {
    padding:12px 16px; font-size:12px; opacity:.7; border-bottom:1px solid rgba(255,255,255,.1);
  }

  .sidebar-nav { flex:1; padding:8px 0; overflow-y:auto; }
  .nav-section { padding:12px 16px 4px; font-size:10px; text-transform:uppercase; letter-spacing:.1em; opacity:.4; font-weight:700; }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:10px 16px;
    font-size:14px; color:rgba(255,255,255,.75); cursor:pointer;
    transition: all 0.15s; text-decoration:none; border:none; background:none; width:100%;
  }
  .nav-item:hover { background:rgba(255,255,255,.08); color:#fff; }
  .nav-item.active { background:rgba(255,255,255,.15); color:#fff; font-weight:600; border-left:3px solid #6abb1e; }
  .nav-item .icon { width:20px; text-align:center; font-size:16px; }
  .nav-item .badge { margin-left:auto; background:#c0392b; color:#fff; font-size:10px; font-weight:700; padding:2px 6px; border-radius:10px; }

  .sidebar-footer {
    padding:12px 16px; border-top:1px solid rgba(255,255,255,.1);
    font-size:11px; opacity:.5;
  }

  /* ── Main Content ── */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 24px; background:var(--white); border-bottom:1px solid var(--border);
    min-height:56px;
  }
  .topbar h2 { font-size:20px; font-weight:700; }
  .topbar-actions { display:flex; gap:8px; align-items:center; }

  .btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600;
    cursor:pointer; border:none; transition:all .15s; text-decoration:none;
  }
  .btn-primary { background:var(--green-dark); color:var(--white); }
  .btn-primary:hover { background:var(--green); }
  .btn-outline { background:var(--white); color:var(--text); border:1px solid var(--border); }
  .btn-outline:hover { background:var(--bg); }

  .content { flex:1; overflow-y:auto; padding:24px; }

  /* ── Mobile hamburger ── */
  .hamburger {
    display:none; background:none; border:none; color:var(--text); font-size:24px;
    cursor:pointer; padding:4px;
  }
  .sidebar-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:99;
  }

  /* ── Dashboard Cards ── */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
  .stat-card {
    background:var(--white); border-radius:12px; padding:20px;
    border:1px solid var(--border); position:relative;
  }
  .stat-card .stat-label { font-size:12px; color:var(--text-light); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
  .stat-card .stat-value { font-size:28px; font-weight:800; color:var(--green-dark); }
  .stat-card .stat-sub { font-size:12px; color:var(--text-light); margin-top:4px; }
  .stat-card .stat-trend { font-size:11px; font-weight:700; }
  .stat-card .stat-trend.up { color:#27ae60; }
  .stat-card .stat-trend.down { color:var(--red); }

  /* ── Tables ── */
  .data-table { width:100%; border-collapse:collapse; background:var(--white); border-radius:12px; overflow:hidden; border:1px solid var(--border); }
  .data-table th { background:var(--bg); padding:10px 16px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-light); border-bottom:1px solid var(--border); }
  .data-table td { padding:12px 16px; font-size:14px; border-bottom:1px solid #f0f0f0; }
  .data-table tr:hover { background:#fafafa; cursor:pointer; }
  .data-table tr:last-child td { border:none; }

  .status-badge {
    display:inline-block; padding:3px 10px; border-radius:12px;
    font-size:11px; font-weight:700;
  }
  .status-active { background:#e8f5e9; color:#2e7d32; }
  .status-lead { background:#e3f2fd; color:#1565c0; }
  .status-late { background:#ffebee; color:#c62828; }
  .status-paid { background:#e8f5e9; color:#2e7d32; }
  .status-draft { background:#f5f5f5; color:#666; }
  .status-sent { background:#fff3e0; color:#e65100; }
  .status-new { background:#e3f2fd; color:#1565c0; }

  /* ── Search ── */
  .search-box {
    display:flex; align-items:center; gap:8px; padding:8px 14px;
    background:var(--bg); border:1px solid var(--border); border-radius:8px;
    font-size:14px; min-width:250px;
  }
  .search-box input { border:none; background:none; outline:none; flex:1; font-size:14px; }

  /* ── Empty state ── */
  .empty-state { text-align:center; padding:60px 20px; color:var(--text-light); }
  .empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-state h3 { font-size:18px; color:var(--text); margin-bottom:8px; }
  .empty-state p { font-size:14px; max-width:400px; margin:0 auto; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .sidebar { position:fixed; left:0; top:0; bottom:0; transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .sidebar-overlay.open { display:block; }
    .hamburger { display:block; }
    .stat-grid { grid-template-columns:1fr 1fr; }
    .content { padding:16px; }
    .topbar { padding:12px 16px; }
    .search-box { min-width:auto; flex:1; }
  }
  @media (max-width: 480px) {
    .stat-grid { grid-template-columns:1fr; }
  }

  /* ── Modals ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200;
    display:flex; align-items:center; justify-content:center; padding:20px;
    opacity:0; transition:opacity .2s;
  }
  .modal-overlay.open { opacity:1; }
  .modal {
    background:var(--white); border-radius:16px; max-width:560px; width:100%;
    max-height:85vh; display:flex; flex-direction:column;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    transform:translateY(20px); transition:transform .2s;
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal.modal-wide { max-width:800px; }
  .modal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px; border-bottom:1px solid var(--border);
  }
  .modal-header h3 { font-size:18px; font-weight:700; }
  .modal-close { background:none; border:none; font-size:28px; cursor:pointer; color:var(--text-light); line-height:1; padding:0 4px; }
  .modal-body { padding:20px; overflow-y:auto; flex:1; }
  .modal-footer {
    display:flex; align-items:center; justify-content:flex-end; gap:8px;
    padding:12px 20px; border-top:1px solid var(--border);
  }

  /* ── Forms ── */
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:13px; font-weight:600; color:var(--text); margin-bottom:4px; }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; padding:9px 12px; border:2px solid var(--border); border-radius:8px;
    font-size:14px; font-family:inherit; background:var(--white); color:var(--text);
    transition:border-color .15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline:none; border-color:var(--green-light);
  }
  .form-group textarea { resize:vertical; }

  /* ── Toast ── */
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px);
    padding:12px 24px; border-radius:10px; font-size:14px; font-weight:600;
    z-index:300; transition:transform .3s; box-shadow:0 4px 20px rgba(0,0,0,.2);
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast-success { background:var(--green-dark); color:var(--white); }
  .toast-error { background:var(--red); color:var(--white); }

  /* ── Filter buttons ── */
  .client-filter.active { background:var(--green-dark) !important; color:var(--white) !important; border-color:var(--green-dark) !important; }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>🌳 Branch Manager <span>Second Nature Tree Service</span></h1>
    </div>
    <div class="sidebar-user">Doug Brown &bull; Owner</div>

    <div class="sidebar-nav">
      <div class="nav-section">Main</div>
      <button class="nav-item active" data-page="dashboard"><span class="icon">🏠</span> Dashboard</button>
      <button class="nav-item" data-page="schedule"><span class="icon">📅</span> Schedule</button>

      <div class="nav-section">Work</div>
      <button class="nav-item" data-page="clients"><span class="icon">👥</span> Clients <span class="badge" id="badge-clients"></span></button>
      <button class="nav-item" data-page="requests"><span class="icon">📥</span> Requests <span class="badge" id="badge-requests"></span></button>
      <button class="nav-item" data-page="quotes"><span class="icon">📋</span> Quotes</button>
      <button class="nav-item" data-page="jobs"><span class="icon">🔧</span> Jobs</button>
      <button class="nav-item" data-page="invoices"><span class="icon">💰</span> Invoices</button>

      <div class="nav-section">Reports</div>
      <button class="nav-item" data-page="insights"><span class="icon">📊</span> Insights</button>
      <button class="nav-item" data-page="reviews"><span class="icon">⭐</span> Reviews</button>

      <div class="nav-section">Tools</div>
      <button class="nav-item" data-page="calculators"><span class="icon">🧮</span> Calculators</button>
      <button class="nav-item" data-page="settings"><span class="icon">⚙️</span> Settings</button>
    </div>

    <div class="sidebar-footer">Branch Manager v1.0</div>
  </nav>

  <!-- Main Content -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h2 id="pageTitle">Dashboard</h2>
      </div>
      <div class="topbar-actions">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" placeholder="Search clients, jobs..." id="globalSearch">
        </div>
        <button class="btn btn-primary" id="pageAction" style="display:none;">+ New</button>
      </div>
    </div>

    <div class="content" id="pageContent">
      <!-- Dynamic page content loads here -->
    </div>
  </div>
</div>

<!-- Module scripts -->
<script src="src/db.js"></script>
<script src="src/ui.js"></script>
<script src="src/pages/dashboard.js"></script>
<script src="src/pages/clients.js"></script>
<script src="src/pages/requests.js"></script>
<script src="src/pages/quotes.js"></script>
<script src="src/pages/jobs.js"></script>
<script src="src/pages/invoices.js"></script>
<script src="src/pages/schedule.js"></script>
<script src="src/pages/insights.js"></script>
<script src="src/pages/settings.js"></script>
<script src="src/pages/propertymap.js"></script>
<script src="src/pdf.js"></script>
<script>
// ── Navigation ──
var currentPage = 'dashboard';
document.querySelectorAll('.nav-item').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var page = this.dataset.page;
    if (page === currentPage) return;
    currentPage = page;
    document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
    loadPage(page);
    if (window.innerWidth <= 768) toggleSidebar();
  });
});

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ── Page Config ──
var pageConfigs = {
  dashboard: { title: 'Dashboard', action: null },
  schedule: { title: 'Schedule', action: '+ New Job', actionFn: 'JobsPage.showForm()' },
  clients: { title: 'Clients', action: '+ New Client', actionFn: 'ClientsPage.showForm()' },
  requests: { title: 'Requests', action: '+ New Request', actionFn: 'RequestsPage.showForm()' },
  quotes: { title: 'Quotes', action: '+ New Quote', actionFn: 'QuotesPage.showForm()' },
  jobs: { title: 'Jobs', action: '+ New Job', actionFn: 'JobsPage.showForm()' },
  invoices: { title: 'Invoices', action: null },
  insights: { title: 'Insights', action: null },
  reviews: { title: 'Reviews', action: null },
  calculators: { title: 'Calculators', action: null },
  settings: { title: 'Settings', action: null }
};

var pageRenderers = {
  dashboard: function() { return DashboardPage.render(); },
  schedule: function() { return SchedulePage.render(); },
  clients: function() { return ClientsPage.render(); },
  requests: function() { return RequestsPage.render(); },
  quotes: function() { return QuotesPage.render(); },
  jobs: function() { return JobsPage.render(); },
  invoices: function() { return InvoicesPage.render(); },
  insights: function() { return InsightsPage.render(); },
  settings: function() { return SettingsPage.render(); },
  calculators: function() {
    return '<div class="stat-grid">'
      + '<a href="https://peekskilltree.com/sub.html" target="_blank" class="stat-card" style="text-decoration:none;cursor:pointer;">'
      + '<div class="stat-label">Job Cost Calculator</div><div class="stat-value" style="font-size:18px;">Rates & Pricing</div><div class="stat-sub">Equipment, labor, insurance, profit</div></a>'
      + '<a href="https://peekskilltree.com/be.html" target="_blank" class="stat-card" style="text-decoration:none;cursor:pointer;">'
      + '<div class="stat-label">Break-Even</div><div class="stat-value" style="font-size:18px;">Monthly P&L</div><div class="stat-sub">Fixed costs, job-by-job tracking</div></a>'
      + '<a href="https://peekskilltree.com/estimate.html" target="_blank" class="stat-card" style="text-decoration:none;cursor:pointer;">'
      + '<div class="stat-label">Field Estimate</div><div class="stat-value" style="font-size:18px;">Quick Pricing</div><div class="stat-sub">DBH, complexity, crew size</div></a>'
      + '<a href="https://peekskilltree.com/ads.html" target="_blank" class="stat-card" style="text-decoration:none;cursor:pointer;">'
      + '<div class="stat-label">Ad ROI</div><div class="stat-value" style="font-size:18px;">Ad Performance</div><div class="stat-sub">Per-channel spend & returns</div></a>'
      + '</div>';
  }
};

function loadPage(page) {
  var config = pageConfigs[page] || { title: page, action: null };
  document.getElementById('pageTitle').textContent = config.title;
  var actionBtn = document.getElementById('pageAction');
  if (config.action) {
    actionBtn.textContent = config.action;
    actionBtn.style.display = '';
    actionBtn.onclick = config.actionFn ? new Function(config.actionFn) : null;
  } else {
    actionBtn.style.display = 'none';
  }

  // Update badges
  var newReqs = DB.requests.countNew();
  document.getElementById('badge-requests').textContent = newReqs > 0 ? newReqs : '';
  document.getElementById('badge-clients').textContent = '';

  var content = document.getElementById('pageContent');
  var renderer = pageRenderers[page];
  if (renderer) {
    content.innerHTML = renderer();
  } else {
    content.innerHTML = '<div class="empty-state"><div class="empty-icon">🚧</div><h3>Coming Soon</h3><p>' + config.title + ' — building next.</p></div>';
  }
}

// ── Global Search ──
document.getElementById('globalSearch').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  if (!q || q.length < 2) return;
  // Quick search across clients
  var results = DB.clients.search(q).slice(0, 5);
  if (results.length && currentPage !== 'clients') {
    loadPage('clients');
    document.querySelectorAll('.nav-item').forEach(function(b) {
      b.classList.toggle('active', b.dataset.page === 'clients');
    });
  }
});

// ── Init ──
loadPage('dashboard');
</script>
</body>
</html>
