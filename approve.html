<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Approval — Second Nature Tree Service</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f0; color: #1d1d1f; min-height: 100vh; }
    .page { max-width: 640px; margin: 0 auto; padding: 20px; }
    .header { background: #1a3c12; color: #fff; padding: 20px 24px; border-radius: 12px 12px 0 0; }
    .header-logo { font-size: 13px; opacity: .75; margin-bottom: 6px; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header-status { margin-top: 10px; }
    .card { background: #fff; border-radius: 0 0 12px 12px; padding: 24px; box-shadow: 0 2px 20px rgba(0,0,0,.08); margin-bottom: 16px; }
    .card-standalone { border-radius: 12px; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .badge-sent { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.4); }
    .badge-approved { background: #e8f5e9; color: #2e7d32; }
    .badge-declined { background: #ffebee; color: #c62828; }
    .section-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; margin-bottom: 6px; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .meta-val { font-size: 14px; font-weight: 500; margin-top: 2px; }
    .desc-box { background: #f8faf8; border-left: 3px solid #1a3c12; border-radius: 0 8px 8px 0; padding: 14px 16px; margin-bottom: 20px; font-size: 14px; line-height: 1.6; color: #333; }
    .line-table { width: 100%; border-collapse: collapse; margin: 10px 0 4px; }
    .line-table th { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; padding: 6px 0; border-bottom: 2px solid #e8e8e8; text-align: left; }
    .line-table th:last-child, .line-table th:nth-child(3), .line-table th:nth-child(4) { text-align: right; }
    .line-table td { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: top; }
    .line-table td:last-child, .line-table td:nth-child(3), .line-table td:nth-child(4) { text-align: right; }
    .line-table .total-row td { font-weight: 700; font-size: 16px; border-top: 2px solid #e8e8e8; border-bottom: none; padding-top: 12px; color: #1a3c12; }
    .actions { margin-top: 24px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 15px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; margin-bottom: 10px; transition: all .15s; }
    .btn:active { transform: scale(.98); }
    .btn-approve { background: #1a3c12; color: #fff; }
    .btn-approve:hover { background: #245219; }
    .btn-changes { background: #fff; color: #1a3c12; border: 2px solid #1a3c12; }
    .btn-changes:hover { background: #f0f7f0; }
    .btn-disabled { background: #e0e0e0; color: #999; cursor: default; }
    .changes-form { display: none; margin-top: 4px; padding: 16px; background: #f8f8f8; border-radius: 8px; }
    textarea { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; line-height: 1.5; }
    textarea:focus { outline: none; border-color: #1a3c12; }
    .success-card { text-align: center; padding: 40px 24px; }
    .success-icon { font-size: 52px; margin-bottom: 16px; }
    .success-card h2 { font-size: 24px; color: #1a3c12; margin-bottom: 8px; }
    .success-card p { color: #666; font-size: 15px; line-height: 1.6; max-width: 360px; margin: 0 auto; }
    .footer { text-align: center; font-size: 12px; color: #999; padding: 8px 0 20px; }
    .footer a { color: #1a3c12; text-decoration: none; }
    .loader { text-align: center; padding: 80px 20px; }
    .loader .icon { font-size: 48px; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .error-card { text-align: center; padding: 40px 20px; }
    .already-approved { background: #e8f5e9; border-radius: 10px; padding: 16px; text-align: center; margin-top: 20px; }
    .sig-canvas {
      width: 100%; height: 150px; border: 2px solid #1a3c12; border-radius: 8px;
      background: #fff; touch-action: none; cursor: crosshair; display: block;
    }
    .sig-section { display: none; margin-top: 16px; border-top: 1px solid #eee; padding-top: 16px; }
    .sig-clear { background: none; border: none; color: #999; font-size: 12px; cursor: pointer; margin-top: 4px; text-decoration: underline; }
    .sig-legal { font-size: 11px; color: #999; margin-top: 10px; line-height: 1.5; }
    @media (max-width: 480px) {
      .page { padding: 10px; }
      .header { padding: 16px 18px; }
      .card { padding: 18px; }
      .meta-grid { grid-template-columns: 1fr; gap: 10px; }
      .line-table th:nth-child(3), .line-table td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="app">
      <div class="loader">
        <div class="icon">🌳</div>
        <div style="color:#666;font-size:15px;">Loading your quote...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    var SUPABASE_URL = 'https://ltpivkqahvplapyagljt.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0cGl2a3FhaHZwbGFweWFnbGp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTgxNzIsImV4cCI6MjA4OTY3NDE3Mn0.bQ-wAx4Uu-FyA2ZwsTVfFoU2ZPbeWCmupqV-6ZR9uFI';
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var params = new URLSearchParams(window.location.search);
    var quoteId = params.get('id');

    function el(id) { return document.getElementById(id); }
    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function money(n) { return '$' + (+(n||0)).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); }
    function dateShort(d) { if (!d) return '—'; var dt = new Date(d); return (dt.getMonth()+1) + '/' + dt.getDate() + '/' + dt.getFullYear(); }

    async function loadQuote() {
      if (!quoteId) { showError('Invalid link — please check your email for the correct link.'); return; }
      try {
        var result = await sb.from('quotes').select('*').eq('id', quoteId).single();
        if (result.error) throw result.error;
        renderQuote(result.data);
      } catch(e) {
        showError('Quote not found. The link may be expired or incorrect.<br><br>Please contact us and we\'ll resend it.');
      }
    }

    function renderQuote(q) {
      var isApproved = q.status === 'approved' || q.status === 'converted';
      var isDeclined = q.status === 'declined';

      var statusBadge = isApproved
        ? '<span class="badge badge-approved">✓ Approved</span>'
        : isDeclined
          ? '<span class="badge badge-declined">Declined</span>'
          : '<span class="badge badge-sent">Awaiting Your Response</span>';

      // Line items
      var items = q.line_items || [];
      var lineRows = '';
      if (items.length) {
        items.forEach(function(item) {
          var amt = item.amount || ((item.qty || 1) * (item.rate || 0));
          lineRows += '<tr>'
            + '<td style="font-weight:600;">' + esc(item.service || 'Service') + '</td>'
            + '<td style="color:#666;font-size:13px;">' + esc(item.description || '') + '</td>'
            + '<td>' + (item.qty || 1) + '</td>'
            + '<td>' + money(item.rate) + '</td>'
            + '<td><strong>' + money(amt) + '</strong></td>'
            + '</tr>';
        });
      } else {
        lineRows = '<tr><td colspan="5" style="color:#999;font-size:13px;padding:16px 0;">See description above for scope of work.</td></tr>';
      }

      // Expiry
      var expiryHtml = '';
      if (q.expires_at) {
        var expDate = new Date(q.expires_at);
        var daysLeft = Math.ceil((expDate - new Date()) / 86400000);
        if (daysLeft < 0) {
          expiryHtml = '<div style="background:#ffebee;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#c62828;font-weight:600;">⚠️ This quote expired on ' + dateShort(q.expires_at) + '. Please contact us for a fresh quote.</div>';
          isDeclined = true; // prevent approval of expired quotes
        } else if (daysLeft <= 7) {
          expiryHtml = '<div style="background:#fff3e0;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#e07c24;font-weight:600;">⏳ This quote expires in ' + daysLeft + ' day' + (daysLeft !== 1 ? 's' : '') + ' (' + dateShort(q.expires_at) + ')</div>';
        }
      }

      // Deposit notice
      var depositHtml = '';
      if (q.deposit_required && !q.deposit_paid) {
        var depDue = q.deposit_due || 0;
        depositHtml = '<div style="background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:14px;margin-top:16px;">'
          + '<div style="font-weight:700;font-size:14px;color:#1a3c12;margin-bottom:4px;">💳 Deposit Required</div>'
          + '<div style="font-size:13px;color:#333;margin-bottom:10px;">A deposit of <strong>' + money(depDue) + '</strong> is required to confirm this quote and schedule your service.</div>'
          + '<a href="pay.html?type=deposit&id=' + esc(q.id) + '" class="btn btn-approve" style="text-decoration:none;display:flex;justify-content:center;">Pay Deposit ' + money(depDue) + ' to Approve</a>'
          + '</div>';
      }

      // Action buttons
      var actionHtml = '';
      if (isApproved) {
        actionHtml = '<div class="already-approved">'
          + '<div style="font-size:24px;margin-bottom:6px;">✅</div>'
          + '<div style="font-weight:700;color:#2e7d32;font-size:16px;">Quote Approved</div>'
          + '<div style="font-size:13px;color:#666;margin-top:4px;">We\'ll be in touch to schedule your service.</div>'
          + '</div>';
      } else if (!isDeclined && !q.deposit_required) {
        actionHtml = '<div class="actions">'
          + '<button class="btn btn-approve" id="btn-approve-main" onclick="showSignaturePad()">✅ Approve This Quote</button>'
          + '<div class="sig-section" id="sig-section">'
          + '<div class="section-label" style="margin-bottom:8px;">Sign to Approve</div>'
          + '<canvas id="sig-canvas" class="sig-canvas" width="700" height="200"></canvas>'
          + '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">'
          + '<div style="font-size:12px;color:#aaa;">Draw your signature above</div>'
          + '<button class="sig-clear" onclick="clearSignature()">✕ Clear</button>'
          + '</div>'
          + '<div style="margin-top:14px;">'
          + '<div class="section-label">Full Name</div>'
          + '<input type="text" id="sig-name" placeholder="Type your full name" style="width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;font-family:inherit;margin-top:4px;">'
          + '</div>'
          + '<div class="sig-legal">By signing and clicking Confirm, you agree to the quote terms and authorize Second Nature Tree Service to perform the described work at the stated price.</div>'
          + '<button class="btn btn-approve" style="margin-top:12px;" onclick="confirmApprove()">✅ Confirm &amp; Approve</button>'
          + '</div>'
          + '<button class="btn btn-changes" onclick="toggleChanges()">💬 Request Changes</button>'
          + '<div class="changes-form" id="changes-form">'
          + '<div class="section-label" style="margin-bottom:8px;">What would you like changed?</div>'
          + '<textarea id="changes-text" rows="4" placeholder="e.g. Please also quote removing the oak in the backyard, and can you include stump grinding?"></textarea>'
          + '<button class="btn btn-approve" style="margin-top:10px;" onclick="submitChanges()">Send Request</button>'
          + '</div>'
          + '</div>'
          + depositHtml;
      } else if (!isDeclined) {
        actionHtml = depositHtml
          + '<div style="margin-top:8px;">'
          + '<button class="btn btn-changes" onclick="toggleChanges()">💬 Request Changes Instead</button>'
          + '<div class="changes-form" id="changes-form">'
          + '<div class="section-label" style="margin-bottom:8px;">What would you like changed?</div>'
          + '<textarea id="changes-text" rows="4" placeholder="Describe what you\'d like us to change..."></textarea>'
          + '<button class="btn btn-approve" style="margin-top:10px;" onclick="submitChanges()">Send Request</button>'
          + '</div></div>';
      }

      // Expiry info for meta grid
      var expiryMeta = q.expires_at
        ? (function() { var d = Math.ceil((new Date(q.expires_at) - new Date()) / 86400000); return d > 0 ? d + ' days left' : 'Expired'; })()
        : '30 days';

      el('app').innerHTML = ''
        + '<div class="header">'
        + '<div class="header-logo">🌳 Second Nature Tree Service</div>'
        + '<h1>Quote #' + esc(q.quote_number || '') + '</h1>'
        + '<div class="header-status">' + statusBadge + '</div>'
        + '</div>'
        + '<div class="card">'
        + expiryHtml
        + '<div class="meta-grid">'
        + '<div><div class="section-label">Property</div><div class="meta-val">' + esc(q.property || '—') + '</div></div>'
        + '<div><div class="section-label">Quote Date</div><div class="meta-val">' + dateShort(q.created_at) + '</div></div>'
        + '<div><div class="section-label">Total</div><div class="meta-val" style="font-size:20px;font-weight:700;color:#1a3c12;">' + money(q.total) + '</div></div>'
        + '<div><div class="section-label">Valid Until</div><div class="meta-val">' + expiryMeta + '</div></div>'
        + '</div>'
        + (q.description ? '<div class="desc-box">' + esc(q.description).replace(/\n/g,'<br>') + '</div>' : '')
        + '<div class="section-label">Services</div>'
        + '<table class="line-table"><thead><tr><th>Service</th><th>Description</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead>'
        + '<tbody>' + lineRows + '</tbody>'
        + (items.length ? '<tfoot><tr class="total-row"><td colspan="4">Total</td><td>' + money(q.total) + '</td></tr></tfoot>' : '')
        + '</table>'
        + actionHtml
        + '</div>'
        + '<div class="footer">Questions? <a href="tel:9143915233">📞 (914) 391-5233</a> · <a href="mailto:info@peekskilltree.com">info@peekskilltree.com</a></div>';

      // Store quote data for button handlers
      window._quoteId = q.id;
      window._quoteData = q;
    }

    var QUOTE_NOTIFY_URL = 'https://ltpivkqahvplapyagljt.supabase.co/functions/v1/quote-notify';

    // ── Signature pad ──────────────────────────────────────────
    var _sigDrawing = false;

    function showSignaturePad() {
      var sec = el('sig-section');
      var mainBtn = el('btn-approve-main');
      if (!sec) return;
      sec.style.display = 'block';
      if (mainBtn) mainBtn.style.display = 'none';
      // Init canvas after it's visible
      setTimeout(function() {
        var canvas = el('sig-canvas');
        if (!canvas || canvas._inited) return;
        canvas._inited = true;
        var ctx = canvas.getContext('2d');
        ctx.strokeStyle = '#1a3c12';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        function pos(e) {
          var r = canvas.getBoundingClientRect();
          var sx = canvas.width / r.width, sy = canvas.height / r.height;
          var cx = e.touches ? e.touches[0].clientX : e.clientX;
          var cy = e.touches ? e.touches[0].clientY : e.clientY;
          return { x: (cx - r.left) * sx, y: (cy - r.top) * sy };
        }
        canvas.addEventListener('mousedown', function(e) { _sigDrawing = true; ctx.beginPath(); var p = pos(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', function(e) { if (!_sigDrawing) return; var p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mouseup', function() { _sigDrawing = false; });
        canvas.addEventListener('mouseleave', function() { _sigDrawing = false; });
        canvas.addEventListener('touchstart', function(e) { e.preventDefault(); _sigDrawing = true; ctx.beginPath(); var p = pos(e); ctx.moveTo(p.x, p.y); }, { passive: false });
        canvas.addEventListener('touchmove', function(e) { e.preventDefault(); if (!_sigDrawing) return; var p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
        canvas.addEventListener('touchend', function() { _sigDrawing = false; });
      }, 50);
    }

    function clearSignature() {
      var canvas = el('sig-canvas');
      if (!canvas) return;
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }

    function _sigIsEmpty() {
      var canvas = el('sig-canvas');
      if (!canvas) return true;
      var data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
      for (var i = 3; i < data.length; i += 4) { if (data[i] > 0) return false; }
      return true;
    }

    async function confirmApprove() {
      var name = (el('sig-name') ? el('sig-name').value.trim() : '');
      if (!name) { alert('Please type your full name to confirm.'); return; }
      if (_sigIsEmpty()) { alert('Please draw your signature above.'); return; }

      var canvas = el('sig-canvas');
      var sigData = canvas ? canvas.toDataURL('image/png') : '';
      var btn = document.querySelector('#sig-section .btn-approve');
      if (btn) { btn.textContent = 'Saving...'; btn.disabled = true; btn.className = 'btn btn-disabled'; }

      try {
        var now = new Date().toISOString();
        var result = await sb.from('quotes')
          .update({ status: 'approved', updated_at: now, client_signature: sigData, signed_name: name, signed_at: now })
          .eq('id', window._quoteId);
        if (result.error) throw result.error;

        var q = window._quoteData || {};
        fetch(QUOTE_NOTIFY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event: 'approved',
            quoteId: window._quoteId,
            quoteNumber: q.quote_number || '',
            clientName: name,
            total: q.total || 0,
            property: q.property || '',
            clientEmail: q.client_email || ''
          })
        }).catch(function(){});

        el('app').innerHTML = ''
          + '<div class="header" style="border-radius:12px;">'
          + '<div class="header-logo">🌳 Second Nature Tree Service</div>'
          + '<h1>Quote Approved!</h1>'
          + '</div>'
          + '<div class="card card-standalone" style="border-radius:0 0 12px 12px;">'
          + '<div class="success-card">'
          + '<div class="success-icon">🌳</div>'
          + '<h2>Thank You, ' + esc(name.split(' ')[0]) + '!</h2>'
          + '<p>Your quote has been approved and your signature has been saved. We\'ll reach out shortly to confirm your scheduled date.</p>'
          + '<p style="margin-top:20px;"><a href="tel:9143915233" style="color:#1a3c12;font-weight:700;text-decoration:none;font-size:16px;">📞 (914) 391-5233</a></p>'
          + '</div>'
          + '</div>'
          + '<div class="footer"><a href="https://peekskilltree.com">peekskilltree.com</a></div>';
      } catch(e) {
        alert('Could not save approval. Please call (914) 391-5233 or email info@peekskilltree.com.');
        if (btn) { btn.textContent = '✅ Confirm & Approve'; btn.disabled = false; btn.className = 'btn btn-approve'; }
      }
    }

    function toggleChanges() {
      var form = el('changes-form');
      if (!form) return;
      form.style.display = form.style.display === 'none' || !form.style.display ? 'block' : 'none';
    }

    async function submitChanges() {
      var notes = el('changes-text') ? el('changes-text').value.trim() : '';
      if (!notes) { alert('Please describe what you\'d like changed.'); return; }

      var btn = document.querySelector('#changes-form .btn-approve');
      if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; }

      try {
        var result2 = await sb.from('quotes')
          .update({ status: 'awaiting', client_changes: notes, updated_at: new Date().toISOString() })
          .eq('id', window._quoteId);
        if (result2.error) throw result2.error;

        fetch(QUOTE_NOTIFY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event: 'changes_requested',
            quoteId: window._quoteId,
            quoteNumber: (window._quoteData || {}).quote_number || '',
            clientName: (window._quoteData || {}).client_name || '',
            total: (window._quoteData || {}).total || 0,
            property: (window._quoteData || {}).property || '',
            changeNotes: notes,
            clientEmail: (window._quoteData || {}).client_email || ''
          })
        }).catch(function(){});

        el('app').innerHTML = ''
          + '<div class="header" style="border-radius:12px;">'
          + '<div class="header-logo">🌳 Second Nature Tree Service</div>'
          + '<h1>Changes Requested</h1>'
          + '</div>'
          + '<div class="card card-standalone" style="border-radius:0 0 12px 12px;">'
          + '<div class="success-card">'
          + '<div class="success-icon">💬</div>'
          + '<h2>Got It!</h2>'
          + '<p>We\'ll update the quote and send you a revised version. If you need to speak with us directly:</p>'
          + '<p style="margin-top:20px;"><a href="tel:9143915233" style="color:#1a3c12;font-weight:700;text-decoration:none;font-size:16px;">📞 (914) 391-5233</a></p>'
          + '</div>'
          + '</div>'
          + '<div class="footer"><a href="https://peekskilltree.com">peekskilltree.com</a></div>';
      } catch(e) {
        alert('Could not send request. Please call (914) 391-5233.');
        if (btn) { btn.textContent = 'Send Request'; btn.disabled = false; }
      }
    }

    function showError(msg) {
      el('app').innerHTML = '<div class="card card-standalone" style="border-radius:12px;margin-top:20px;">'
        + '<div class="error-card">'
        + '<div style="font-size:40px;margin-bottom:16px;">⚠️</div>'
        + '<h2 style="margin-bottom:8px;">Link Not Found</h2>'
        + '<p style="color:#666;" id="err-msg">' + msg + '</p>'
        + '<p style="margin-top:20px;"><a href="tel:9143915233" style="color:#1a3c12;font-weight:700;text-decoration:none;">📞 (914) 391-5233</a></p>'
        + '</div></div>'
        + '<div class="footer"><a href="https://peekskilltree.com">peekskilltree.com</a></div>';
    }

    window.addEventListener('load', loadQuote);
  </script>
</body>
</html>
